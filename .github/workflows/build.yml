name: Build and push container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # Smoke tests (no GPU, no model load) — run on every push/PR
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies (CPU-only torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi uvicorn soundfile numpy httpx pytest prometheus-client python-multipart safetensors

      - name: Run smoke tests
        run: pytest -q tests/

  # ------------------------------------------------------------------
  # Container build + push to GHCR
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      # Required for github/codeql-action/upload-sarif (Trivy findings →
      # GitHub Security tab).
      security-events: write
      # Required by some attestation/provenance flows.
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            # Explicit latest tag on main — avoids docker/metadata-action
            # template evaluation bugs with {{is_default_branch}}.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SBOM (SPDX) + SLSA build provenance as in-toto attestations on GHCR.
          # Inspect with:
          #   docker buildx imagetools inspect \
          #     --format '{{ json .SBOM }}' ghcr.io/<org>/<image>:latest
          sbom: true
          provenance: mode=max

      # ----------------------------------------------------------------
      # Vulnerability scan (Trivy) — CRITICAL/HIGH only, ignore unfixed.
      # Results uploaded to GitHub Security tab as SARIF.  Non-blocking:
      # we surface findings without failing the build (upstream CUDA base
      # images routinely carry known CVEs we can't patch ourselves).
      # ----------------------------------------------------------------
      - name: Trivy vulnerability scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.35.0
        env:
          # Authenticated pulls of the trivy-db from ghcr.io avoid public
          # rate limits that occasionally fail CI.
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
